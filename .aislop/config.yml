version: 1
exclude:
  - '**/node_modules/**'
  - '**/storybook-static/**'
  - '**/out/**'
  - '**/dist/**'
  - '**/.storybook/**'
  - '**/esbuild.js'
  - 'src/services/graphql.js'
engines:
  format: true
  lint: true
  code-quality: true
  ai-slop: true
  architecture: true
  security: true
quality:
  maxFunctionLoc: 80
  maxFileLoc: 400
  maxNesting: 5
  maxParams: 6
lint:
  typecheck: false
security:
  audit: true
  auditTimeout: 25000
scoring:
  weights:
    format: 0.3
    lint: 0.6
    code-quality: 0.8
    ai-slop: 2.5
    architecture: 1
    security: 1.5
  thresholds:
    good: 75
    ok: 50
  smoothing: 20
  maxPerRule: 40
ci:
  failBelow: 100
  format: json
telemetry:
  enabled: false
